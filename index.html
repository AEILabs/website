<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEI Labs — Advanced Economic Intelligence</title>
    <meta name="description" content="Economic Intelligence linking global trade and transport network models to national CGE and quantitative regional models." />
    <meta name="author" content="Advanced Economic Intelligence" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="AEI Labs — Advanced Economic Intelligence" />
    <meta property="og:description" content="Economic Intelligence linking global trade and transport network models to national CGE and quantitative regional models." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <!-- SPA route restore: decode the path encoded by 404.html and rewrite history
         before React Router boots, so direct navigation to /technology etc. works. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
